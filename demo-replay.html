<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luigi the Linux Plumber - Session Replay</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap");
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Inter",sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
  .header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
  .header h1{font-size:1.1rem;font-weight:600}
  .badge{font-size:0.7rem;font-weight:600;padding:2px 10px;border-radius:12px;background:#6e7681;color:#fff}
  .badge.running{background:#d29922} .badge.done{background:#238636}
  .controls{margin-left:auto;display:flex;gap:8px;align-items:center}
  .controls button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:0.8rem}
  .controls button:hover{background:#30363d}
  .controls button.primary{background:#238636;border-color:#238636;color:#fff}
  .speed-label{font-size:0.75rem;color:#6e7681}
  .container{max-width:900px;margin:0 auto;padding:24px}
  .event{opacity:0;transform:translateY(8px);transition:opacity 0.3s,transform 0.3s;margin-bottom:8px}
  .event.visible{opacity:1;transform:translateY(0)}
  .event-row{display:flex;gap:10px;align-items:flex-start;padding:8px 12px;border-radius:8px}
  .event-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0;margin-top:2px}
  .event-body{flex:1;min-width:0}
  .event-type{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px}
  .event-text{font-size:0.85rem;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .event-detail{font-family:"JetBrains Mono",monospace;font-size:0.75rem;color:#8b949e;margin-top:4px;padding:6px 10px;background:#0d1117;border-radius:4px;white-space:pre-wrap;word-break:break-all}
  .msg{background:rgba(136,87,255,0.06)} .msg .event-icon{background:rgba(136,87,255,0.15);color:#a371f7} .msg .event-type{color:#a371f7}
  .tool{background:rgba(56,139,253,0.06)} .tool .event-icon{background:rgba(56,139,253,0.15);color:#58a6ff} .tool .event-type{color:#58a6ff}
  .result .event-icon{background:rgba(63,185,80,0.15);color:#3fb950} .result .event-type{color:#3fb950}
  .result .event-text{font-family:"JetBrains Mono",monospace;font-size:0.75rem;color:#8b949e;max-height:200px;overflow-y:auto}
  .status .event-type{color:#6e7681;font-size:0.65rem;text-align:center}
  .counter{position:fixed;bottom:16px;right:24px;font-size:0.75rem;color:#6e7681;background:#161b22;padding:4px 12px;border-radius:12px;border:1px solid #30363d}
</style>
</head>
<body>
<div class="header">
  <span style="font-size:1.5rem">&#x1F527;</span>
  <h1>Luigi the Linux Plumber</h1>
  <span class="badge" id="status-badge">Idle</span>
  <span style="font-size:0.75rem;color:#6e7681">Reviewing pi-blaster issues</span>
  <div class="controls">
    <span class="speed-label">Speed:</span>
    <button onclick="setSpeed(0.5)">0.5x</button>
    <button onclick="setSpeed(1)" class="primary">1x</button>
    <button onclick="setSpeed(3)">3x</button>
    <button onclick="setSpeed(10)">10x</button>
    <button onclick="replay()" style="margin-left:8px">&#x21BB; Replay</button>
  </div>
</div>
<div class="container" id="events"></div>
<div class="counter" id="counter">0 / 0</div>

let speed = 1;
function setSpeed(s){speed=s}
function getDelay(ev){
  if(ev.type==="agent")return 1500;
  if(ev.type==="agent_tool_use")return 800;
  if(ev.type==="agent_tool_result")return 600;
  return 300;
}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML.replace(/\n/g,"<br>")}
function renderEvent(ev,idx){
  const div=document.createElement("div");div.className="event";div.id="ev-"+idx;
  let cls="status",icon="&#x2022;",label=ev.type,body="";
  if(ev.type==="agent"&&ev.text){cls="msg";icon="&#x2728;";label="Luigi says";body='<div class="event-text">'+esc(ev.text)+'</div>'}
  else if(ev.type==="agent_tool_use"){cls="tool";icon="&#x1F6E0;";label="Tool: "+(ev.tool||"?");if(ev.detail)body='<div class="event-detail">'+esc(ev.detail)+'</div>'}
  else if(ev.type==="agent_tool_result"){cls="result";icon="&#x2705;";label="Result";if(ev.text)body='<div class="event-text">'+esc(ev.text)+'</div>'}
  else if(ev.type==="status_running"){label="&#x1F7E2; Session running";document.getElementById("status-badge").textContent="Running";document.getElementById("status-badge").className="badge running"}
  else if(ev.type==="status_idle"){label="&#x26AA; Luigi finished!";document.getElementById("status-badge").textContent="Done";document.getElementById("status-badge").className="badge done"}
  else if(ev.type==="user"){cls="msg";icon="&#x1F464;";label="Task sent to Luigi"}
  div.innerHTML='<div class="event-row '+cls+'"><div class="event-icon">'+icon+'</div><div class="event-body"><div class="event-type">'+label+'</div>'+body+'</div></div>';
  return div;
}
async function replay(){
  const c=document.getElementById("events");c.innerHTML="";
  document.getElementById("status-badge").textContent="Idle";document.getElementById("status-badge").className="badge";
  let shown=0;
  for(let i=0;i<EVENTS.length;i++){
    const ev=EVENTS[i];
    if(ev.type==="model_request_start"||ev.type==="model_request_end")continue;
    const el=renderEvent(ev,i);c.appendChild(el);
    await new Promise(r=>setTimeout(r,50));
    el.classList.add("visible");el.scrollIntoView({behavior:"smooth",block:"end"});
    shown++;document.getElementById("counter").textContent=shown+" / "+EVENTS.length+" events";
    await new Promise(r=>setTimeout(r,getDelay(ev)/speed));
  }
}
window.addEventListener("load",()=>{document.getElementById("counter").textContent="0 / "+EVENTS.length;setTimeout(replay,500)});
</script>
</body>
</html>
